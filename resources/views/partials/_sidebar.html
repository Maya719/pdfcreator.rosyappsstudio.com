<aside id="sidebar" class="flex flex-col z-40 left-0 top-0 lg:static lg:left-auto lg:top-auto lg:translate-x-0 h-screen overflow-y-scroll lg:overflow-y-auto no-scrollbar w-64 lg:w-72 shrink-0 bg-white border-r border-gray-200 transition-all duration-200 ease-in-out">

  <!-- Sidebar header -->
  <div class="flex justify-between mb-10 pr-3 sm:px-2 py-5">
    <!-- Logo -->
    <a class="flex items-center space-x-3 px-4" href="/admin">
      <div class="flex items-center justify-center w-10 h-10 rounded-lg bg-primary-600 text-white shadow-md">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
        </svg>
      </div>
      <span class="text-xl font-bold text-gray-800 tracking-tight">PDF Creator</span>
    </a>
  </div>

  <!-- Links -->
  <div class="space-y-8 px-4">
    <!-- Pages group -->
    <div>
      <h3 class="text-xs uppercase text-gray-400 font-semibold pl-3 mb-4 tracking-wider">Main Menu</h3>
      <ul class="space-y-1">
        <!-- Dashboard -->
        <li>
          <a href="/admin" class="flex items-center px-3 py-2.5 rounded-lg text-gray-600 hover:text-primary-600 hover:bg-primary-50 transition-all duration-200 group active:bg-primary-100 active:text-primary-700">
            <svg class="w-5 h-5 mr-3 text-gray-400 group-hover:text-primary-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m0 0l-7 7m7-7v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            <span class="text-sm font-medium">Dashboard</span>
          </a>
        </li>
        <!-- Conversions -->
        <li>
          <a href="/admin/conversions" class="flex items-center px-3 py-2.5 rounded-lg text-gray-600 hover:text-primary-600 hover:bg-primary-50 transition-all duration-200 group">
            <svg class="w-5 h-5 mr-3 text-gray-400 group-hover:text-primary-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path>
            </svg>
            <span class="text-sm font-medium">Conversions</span>
          </a>
        </li>
        <!-- Users -->
        <li>
          <a href="/admin/users" class="flex items-center px-3 py-2.5 rounded-lg text-gray-600 hover:text-primary-600 hover:bg-primary-50 transition-all duration-200 group">
            <svg class="w-5 h-5 mr-3 text-gray-400 group-hover:text-primary-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292V15.5a4 4 0 11-4-4H8a4 4 0 11-4-4V4.354z"></path>
            </svg>
            <span class="text-sm font-medium">Users</span>
          </a>
        </li>
      </ul>
    </div>

    <!-- Settings group -->
    <div>
      <h3 class="text-xs uppercase text-gray-400 font-semibold pl-3 mb-4 tracking-wider">System</h3>
      <ul class="space-y-1">
        <li>
          <a href="/admin/settings" class="flex items-center px-3 py-2.5 rounded-lg text-gray-600 hover:text-primary-600 hover:bg-primary-50 transition-all duration-200 group">
            <svg class="w-5 h-5 mr-3 text-gray-400 group-hover:text-primary-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.96.653 2.529.027 2.573-1.065z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span class="text-sm font-medium">Settings</span>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Sidebar footer (optional) -->
  <div class="mt-auto px-4 py-6">
    <div class="bg-gray-50 rounded-xl p-4 border border-gray-100">
      <div class="flex items-center">
        <div class="w-10 h-10 rounded-full bg-primary-100 flex items-center justify-center text-primary-700 font-bold mr-3">
          {{ user.username[0]|upper if user else 'A' }}
        </div>
        <div>
          <div class="text-sm font-bold text-gray-800">{{ user.username if user else 'Admin' }}</div>
          <div class="text-xs text-gray-500">Administrator</div>
        </div>
      </div>
    </div>
  </div>

</aside>
