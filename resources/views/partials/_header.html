<header class="sticky top-0 bg-white border-b border-gray-200 z-30">
  <div class="px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 -mb-px">

      <!-- Header: Left side -->
      <div class="flex">
        <!-- Hamburger button (for mobile) -->
        <button class="text-gray-500 hover:text-gray-600 lg:hidden" aria-controls="sidebar">
          <span class="sr-only">Open sidebar</span>
          <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="5" width="16" height="2" />
            <rect x="4" y="11" width="16" height="2" />
            <rect x="4" y="17" width="16" height="2" />
          </svg>
        </button>

        <!-- Search input -->
        <div class="hidden sm:block ml-4">
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
            </span>
            <input class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:bg-white focus:border-transparent transition-all duration-200" placeholder="Search for anything..." type="search">
          </div>
        </div>
      </div>

      <!-- Header: Right side -->
      <div class="flex items-center space-x-3">
        
        <!-- Notifications -->
        <button class="relative w-8 h-8 flex items-center justify-center bg-gray-100 hover:bg-gray-200 text-gray-500 rounded-full transition-colors duration-200">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
          <div class="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></div>
        </button>

        <hr class="w-px h-6 bg-gray-200 mx-3" />

        <!-- User profile -->
        <div class="relative inline-flex items-center">
          <button class="inline-flex justify-center items-center group">
            <div class="flex items-center truncate">
              <span class="truncate ml-2 text-sm font-medium text-gray-600 group-hover:text-gray-800">{{ user.username if user else 'Admin' }}</span>
              <svg class="w-3 h-3 shrink-0 ml-1 fill-current text-gray-400" viewBox="0 0 12 12">
                <path d="M5.9 8L1.6 3.7l1.4-1.4L5.9 5.2l2.9-2.9 1.4 1.4L5.9 8z" />
              </svg>
            </div>
          </button>
          
          <!-- Dropdown (simplified as a link for now) -->
          <a href="/admin/auth/logout" class="ml-4 text-sm font-medium text-red-500 hover:text-red-700">Logout</a>
        </div>

      </div>

    </div>
  </div>
</header>
