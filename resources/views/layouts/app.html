<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDF Creator | Professional Document Conversion{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            200: '#bae2fd',
                            300: '#7cc8fb',
                            400: '#36a8f8',
                            500: '#0c87eb',
                            600: '#0267c7',
                            700: '#0352a1',
                            800: '#074585',
                            900: '#0c3b6e',
                        },
                        neutral: {
                            50: '#fafafa',
                            100: '#f5f5f5',
                            200: '#e5e5e5',
                            300: '#d4d4d4',
                            400: '#a3a3a3',
                            500: '#737373',
                            600: '#525252',
                            700: '#404040',
                            800: '#262626',
                            900: '#171717',
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    boxShadow: {
                        'realistic': '0 2px 4px 0 rgba(0,0,0,0.02), 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.02)',
                        'realistic-hover': '0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02)',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #fcfcfd;
            background-image: 
                radial-gradient(at 0% 0%, rgba(12, 135, 235, 0.03) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.03) 0, transparent 50%);
        }
        .card-realistic {
            background: #ffffff;
            border: 1px solid #f0f0f0;
            box-shadow: 0 4px 6px -1px border-neutral-100;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="text-neutral-800 font-sans min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 px-8 py-5 flex items-center justify-between bg-white/80 backdrop-blur-md border-b border-neutral-100 shadow-sm">
        <div class="flex items-center space-x-4">
            <div class="w-11 h-11 bg-brand-500 rounded-2xl flex items-center justify-center shadow-lg shadow-brand-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
            </div>
            <a href="/" class="text-2xl font-extrabold tracking-tight text-neutral-900">
                PDF<span class="text-brand-500">Creator</span>
            </a>
        </div>
        <div class="hidden lg:flex items-center space-x-10">
            <a href="/word-to-pdf" class="text-[15px] font-semibold text-neutral-500 hover:text-brand-500 transition-colors">Word</a>
            <a href="/excel-to-pdf" class="text-[15px] font-semibold text-neutral-500 hover:text-brand-500 transition-colors">Excel</a>
            <a href="/ppt-to-pdf" class="text-[15px] font-semibold text-neutral-500 hover:text-brand-500 transition-colors">PPT</a>
            <a href="/jpg-to-pdf" class="text-[15px] font-semibold text-neutral-500 hover:text-brand-500 transition-colors">Images</a>
            <a href="/html-to-pdf" class="text-[15px] font-semibold text-neutral-500 hover:text-brand-500 transition-colors">HTML</a>
            <a href="/pdf-to-word" class="text-[15px] font-semibold text-neutral-500 hover:text-brand-500 transition-colors">PDF to Word</a>
        </div>
        <div>
            <a href="/api-docs" class="text-[14px] px-6 py-2.5 rounded-xl bg-neutral-900 text-white hover:bg-neutral-800 transition-all font-bold shadow-md">
                API Docs
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center py-16 px-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-neutral-100 text-center bg-white">
        <p class="text-sm font-medium text-neutral-400">
            &copy; 2026 PDF Creator Pro. High-performance document processing.
        </p>
    </footer>

    <script>
        async function handleConversion(event, endpoint = '/api/convert') {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            // Only append target_format if not already present (for /convert endpoint)
            if (endpoint === '/api/convert' && !formData.has('target_format')) {
                formData.append('target_format', 'pdf');
            }

            const submitBtn = form.querySelector('button[type="submit"]');
            const loader = document.getElementById('loader');
            const resultSection = document.getElementById('result-section');
            const resultUrl = document.getElementById('result-url');
            const errorSection = document.getElementById('error-section');
            const errorMessage = document.getElementById('error-message');

            // Reset UI
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            loader.classList.remove('hidden');
            resultSection.classList.add('hidden');
            errorSection.classList.add('hidden');

            try {
                // If the form has an html_content field, it might be a JSON request
                let fetchOptions = {
                    method: 'POST',
                    headers: {
                        'X-API-Key': '{{ api_key }}'
                    }
                };

                // Check if it's the HTML Code route which expects JSON
                if (endpoint === '/api/html-to-pdf/code') {
                    const obj = {};
                    formData.forEach((value, key) => obj[key] = value);
                    fetchOptions.headers['Content-Type'] = 'application/json';
                    fetchOptions.body = JSON.stringify(obj);
                } else {
                    fetchOptions.body = formData;
                }

                const response = await fetch(endpoint, fetchOptions);
                const data = await response.json();

                if (response.ok) {
                    resultUrl.href = data.file_url;
                    resultSection.classList.remove('hidden');
                    resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    errorMessage.textContent = data.detail || 'Conversion failed. Please try again.';
                    errorSection.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = 'An unexpected connection error occurred.';
                errorSection.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
