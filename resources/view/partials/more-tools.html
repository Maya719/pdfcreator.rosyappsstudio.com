<section class="bg-[#f3f4f6]/50 border-t border-b border-gray-100 py-16">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <h2 class="text-center text-2xl sm:text-3xl font-extrabold text-[#111827] tracking-tight mb-8">
            Explore More Tools
        </h2>

        <div class="bg-white rounded-2xl border border-gray-100 p-4 shadow-xl shadow-gray-100/70 max-w-5xl mx-auto">
            <div class="more-tools-container flex items-center overflow-x-auto snap-x scroll-smooth gap-0 no-scrollbar">
                {% for tool in tools %}
                <a href="{{ tool.url }}" class="flex items-center min-w-[150px] sm:min-w-[160px] flex-1 justify-between snap-start group px-2">
                    <div class="flex flex-col items-center text-center w-full py-4 cursor-pointer">
                        <img src="{{ tool.icon }}" class="w-14 h-14 mb-3 transition group-hover:scale-105 duration-200" alt="{{ tool.name }}">
                        <span class="text-xs font-bold text-gray-900 tracking-tight">{{ tool.name }}</span>
                    </div>
                    <div class="h-12 w-[1px] bg-gray-200/80 self-center hidden sm:block"></div>
                </a>
                {% endfor %}
            </div>
        </div>

        <div class="flex justify-center items-center gap-2 mt-8">
            <button class="carousel-left-btn w-9 h-9 rounded-full bg-gray-200/70 flex items-center justify-center text-gray-500 hover:bg-gray-300 transition duration-200 text-xs">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <button class="carousel-right-btn w-9 h-9 rounded-full bg-white shadow-md shadow-gray-200 border border-gray-100 flex items-center justify-center text-gray-800 hover:bg-gray-50 transition duration-200 text-xs">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>

    </div>
</section>

<style>
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const container = document.querySelector('.more-tools-container');
        const leftBtn = document.querySelector('.carousel-left-btn');
        const rightBtn = document.querySelector('.carousel-right-btn');

        if (container && leftBtn && rightBtn) {
            leftBtn.addEventListener('click', function() {
                container.scrollBy({
                    left: -200,
                    behavior: 'smooth'
                });
            });

            rightBtn.addEventListener('click', function() {
                container.scrollBy({
                    left: 200,
                    behavior: 'smooth'
                });
            });
        }
    });
</script>
