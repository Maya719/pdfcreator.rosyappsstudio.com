<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDF Creator - Free Online PDF Tools{% endblock %}</title>
    {{ css_asset('resources/css/app.css') }}
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-[#fcfbfa] text-gray-800 antialiased">

        {% block content %}{% endblock %}

    {% include "partials/more-tools.html" %}
    {% include "partials/footer.html" %}

    {% block extra_js %}{% endblock %}
</body>
</html>
